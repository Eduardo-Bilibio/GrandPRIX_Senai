<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrobras AR - Acesso Restrito</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2.2em;
      background: linear-gradient(45deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    /* Scanner */
    #scanner-container {
      position: relative;
      margin: 30px 0;
    }

    #video {
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      background: #000;
    }

    .scanner-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border: 3px solid #00ff88;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    #status {
      font-size: 1.1em;
      margin-top: 15px;
      color: #00ff88;
    }

    /* Dashboard */
    .hidden { display: none; }
    .badge { display: inline-block; background: #00ff88; color: #0f2027; padding: 5px 15px; border-radius: 15px; font-weight: bold; margin-top: 10px; }
    
    .metrics { display: grid; gap: 15px; margin: 25px 0; }
    .metric { 
      background: rgba(255,255,255,0.1); 
      padding: 15px; 
      border-radius: 12px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      backdrop-filter: blur(10px);
    }
    .value { font-weight: bold; color: #00d4ff; font-size: 1.2em; }
    .alert { border-left: 4px solid #ff6b6b; background: rgba(255, 107, 107, 0.1); }

    /* Chat */
    .ai-chat { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: left; }
    #chat-output { height: 150px; overflow-y: auto; font-size: 0.9em; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-input { display: flex; gap: 5px; }
    .chat-input input { flex: 1; padding: 12px; border-radius: 10px; border: none; outline: none; }
    .chat-input button { padding: 0 15px; background: #00d4ff; border: none; border-radius: 10px; cursor: pointer; color: #0f2027; font-weight: bold; }

    .logout-btn { margin-top: 30px; background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; padding: 12px 25px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
    .logout-btn:hover { background: #ff6b6b; color: white; }
  </style>
</head>
<body>

  <div class="container">
    <section id="login-screen">
      <header>
        <h1>🔒 Petrobras AR</h1>
        <p>Aponte para o QR Code de identificação</p>
      </header>

      <div id="scanner-container">
        <video id="video" autoplay muted playsinline></video>
        <div class="scanner-frame"></div>
      </div>
      <p id="status">Aguardando leitura...</p>
    </section>

    <section id="dashboard-screen" class="hidden">
      <header>
        <h2 id="welcome-msg">Olá!</h2>
        <span id="user-badge" class="badge"></span>
      </header>

      <div class="metrics">
        <div class="metric"><p>🛢️ Produção</p><p id="m-prod" class="value"></p></div>
        <div class="metric"><p>📍 Poços Ativos</p><p id="m-pocos" class="value"></p></div>
        <div id="orcamento-row" class="metric"><p>💰 Orçamento</p><p id="m-orc" class="value"></p></div>
        <div class="metric alert"><p>🚨 Alertas</p><p id="m-alertas" class="value"></p></div>
      </div>

      <div class="ai-chat">
        <div id="chat-output"><div><strong>IA:</strong> Sistema pronto. Como posso ajudar?</div></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Pergunte ao assistente...">
          <button onclick="sendChat()">➤</button>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">Encerrar Sessão</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    // Cadastro de Usuários Permitidos
    const USERS = {
      '123': { name: 'João Silva', cargo: 'Engenheiro Sênior', nivel: 'alto' },
      '456': { name: 'Maria Santos', cargo: 'Analista Júnior', nivel: 'baixo' },
      '789': { name: 'Carlos Oliveira', cargo: 'Gerente Operacional', nivel: 'alto' }
    };

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          video.srcObject = stream;
          requestAnimationFrame(tick);
        })
        .catch(err => {
          document.getElementById('status').innerHTML = "❌ Erro ao acessar câmera.<br>Verifique se está usando HTTPS.";
          console.error(err);
        });
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
          authenticate(code.data);
          return;
        }
      }
      if (!document.getElementById('login-screen').classList.contains('hidden')) {
        requestAnimationFrame(tick);
      }
    }

    function authenticate(token) {
      const user = USERS[token];
      if (!user) {
        document.getElementById('status').textContent = '❌ Usuário não reconhecido';
        document.getElementById('status').style.color = '#ff6b6b';
        setTimeout(() => {
          document.getElementById('status').textContent = 'Aguardando leitura...';
          document.getElementById('status').style.color = '#00ff88';
        }, 2000);
        return;
      }

      localStorage.setItem('petro_user', JSON.stringify(user));
      showDashboard(user);
    }

    function showDashboard(user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      
      document.getElementById('welcome-msg').textContent = `Olá, ${user.name.split(' ')[0]}!`;
      document.getElementById('user-badge').textContent = user.cargo;

      const isAdmin = user.nivel === 'alto';
      document.getElementById('m-prod').textContent = isAdmin ? '2.450 bbl' : '2.100 bbl';
      document.getElementById('m-pocos').textContent = isAdmin ? '47' : '32';
      document.getElementById('m-alertas').textContent = isAdmin ? '2' : '0';
      
      const orcRow = document.getElementById('orcamento-row');
      if (isAdmin) {
        orcRow.style.display = 'flex';
        document.getElementById('m-orc').textContent = '$12.4M';
      } else {
        orcRow.style.display = 'none';
      }
    }

    function sendChat() {
      const input = document.getElementById('chat-input');
      const output = document.getElementById('chat-output');
      const user = JSON.parse(localStorage.getItem('petro_user'));

      if (!input.value) return;

      output.innerHTML += `<div><strong>Você:</strong> ${input.value}</div>`;
      
      let resp = "Não localizei dados específicos sobre sua consulta.";
      const msg = input.value.toLowerCase();

      if (msg.includes('status')) resp = "Sistemas operando em regime de eficiência nominal.";
      if (msg.includes('produção') || msg.includes('barris')) resp = `A produção atual é de ${user.nivel === 'alto' ? '2.450' : '2.100'} barris.`;
      if (user.cargo.includes('Engenheiro') && msg.includes('alerta')) resp = "Alerta no Poço X-15: Vibração acima da média detectada.";

      setTimeout(() => {
        output.innerHTML += `<div><strong>IA:</strong> ${resp}</div>`;
        output.scrollTop = output.scrollHeight;
      }, 600);
      input.value = '';
    }

    function logout() {
      localStorage.removeItem('petro_user');
      location.reload();
    }

    window.onload = () => {
      const savedUser = localStorage.getItem('petro_user');
      if (savedUser) {
        showDashboard(JSON.parse(savedUser));
      } else {
        startCamera();
      }
    };

    // Suporte para tecla Enter no chat
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendChat();
    });
  </script>
</body>
</html>

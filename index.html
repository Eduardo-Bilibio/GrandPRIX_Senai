<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrobras AR - Sistema Integrado</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2.2em;
      background: linear-gradient(45deg, #00d4ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    /* Scanner */
    #scanner-container {
      position: relative;
      margin: 30px 0;
    }

    #video {
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      background: #000;
    }

    .scanner-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: 220px;
      border: 3px solid #00ff88;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    /* Admin Buttons */
    .admin-qrs { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; }
    .qr-buttons button {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid #00d4ff;
      color: white;
      padding: 8px 15px;
      margin: 5px;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
    }
    .qr-buttons button:hover { background: #00d4ff; color: #0f2027; }

    /* Dashboard Elements */
    .hidden { display: none; }
    .badge { display: inline-block; background: #00ff88; color: #0f2027; padding: 5px 15px; border-radius: 15px; font-weight: bold; margin-top: 10px; }
    
    .metrics { display: grid; gap: 15px; margin: 25px 0; }
    .metric { 
      background: rgba(255,255,255,0.1); 
      padding: 15px; 
      border-radius: 12px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      backdrop-filter: blur(5px);
    }
    .value { font-weight: bold; color: #00d4ff; font-size: 1.2em; }
    .alert { border-left: 4px solid #ff6b6b; background: rgba(255, 107, 107, 0.1); }

    /* Chat */
    .ai-chat { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: left; }
    #chat-output { height: 150px; overflow-y: auto; font-size: 0.9em; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .chat-input { display: flex; gap: 5px; }
    .chat-input input { flex: 1; padding: 10px; border-radius: 10px; border: none; }
    .chat-input button { padding: 10px; background: #00d4ff; border: none; border-radius: 10px; cursor: pointer; }

    .logout-btn { margin-top: 20px; background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>

  <div class="container">
    <section id="login-screen">
      <header>
        <h1>🔒 Petrobras AR</h1>
        <p>Autenticação Biométrica/QR</p>
      </header>

      <div id="scanner-container">
        <video id="video" autoplay muted playsinline></video>
        <div class="scanner-frame"></div>
      </div>
      <p id="status">Aguardando leitura...</p>

      <div class="admin-qrs">
        <p style="font-size: 0.8em; margin-bottom: 10px; opacity: 0.7;">Simular Acesso (Desenvolvimento):</p>
        <div class="qr-buttons">
          <button onclick="login('123')">Engenheiro</button>
          <button onclick="login('456')">Analista</button>
          <button onclick="login('789')">Gerente</button>
        </div>
      </div>
    </section>

    <section id="dashboard-screen" class="hidden">
      <header>
        <h2 id="welcome-msg">Olá!</h2>
        <span id="user-badge" class="badge"></span>
      </header>

      <div class="metrics">
        <div class="metric"><p>🛢️ Produção</p><p id="m-prod" class="value"></p></div>
        <div class="metric"><p>📍 Poços Ativos</p><p id="m-pocos" class="value"></p></div>
        <div id="orcamento-row" class="metric"><p>💰 Orçamento</p><p id="m-orc" class="value"></p></div>
        <div class="metric alert"><p>🚨 Alertas</p><p id="m-alertas" class="value"></p></div>
      </div>

      <div class="ai-chat">
        <div id="chat-output"><div><strong>IA:</strong> Sistema pronto. Como posso ajudar?</div></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Pergunte algo...">
          <button onclick="sendChat()">➤</button>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">Sair do Sistema</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    // Banco de Dados Simulado
    const USERS = {
      '123': { name: 'João Silva', cargo: 'Engenheiro Sênior', nivel: 'alto' },
      '456': { name: 'Maria Santos', cargo: 'Analista Júnior', nivel: 'baixo' },
      '789': { name: 'Carlos Oliveira', cargo: 'Gerente Operacional', nivel: 'alto' }
    };

    // Inicializar Câmera
    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          video.srcObject = stream;
          requestAnimationFrame(tick);
        })
        .catch(err => console.error("Erro na câmera: ", err));
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
          login(code.data);
          return; // Para o loop após logar
        }
      }
      if (!document.getElementById('login-screen').classList.contains('hidden')) {
        requestAnimationFrame(tick);
      }
    }

    function login(token) {
      const user = USERS[token];
      if (!user) {
        document.getElementById('status').textContent = '❌ QR Inválido';
        setTimeout(() => document.getElementById('status').textContent = 'Aguardando leitura...', 2000);
        return;
      }

      // Salva sessão e troca telas
      localStorage.setItem('petro_user', JSON.stringify(user));
      showDashboard(user);
    }

    function showDashboard(user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      
      document.getElementById('welcome-msg').textContent = `Olá, ${user.name.split(' ')[0]}!`;
      document.getElementById('user-badge').textContent = user.cargo;

      // Dados baseados no nível
      const isAdmin = user.nivel === 'alto';
      document.getElementById('m-prod').textContent = isAdmin ? '2.450 bbl' : '2.100 bbl';
      document.getElementById('m-pocos').textContent = isAdmin ? '47' : '32';
      document.getElementById('m-alertas').textContent = isAdmin ? '2' : '0';
      
      const orcRow = document.getElementById('orcamento-row');
      if (isAdmin) {
        orcRow.style.display = 'flex';
        document.getElementById('m-orc').textContent = '$12.4M';
      } else {
        orcRow.style.display = 'none';
      }
    }

    function sendChat() {
      const input = document.getElementById('chat-input');
      const output = document.getElementById('chat-output');
      const user = JSON.parse(localStorage.getItem('petro_user'));

      if (!input.value) return;

      output.innerHTML += `<div><strong>Você:</strong> ${input.value}</div>`;
      
      let resp = "Não tenho acesso a essa informação no momento.";
      if (input.value.toLowerCase().includes('status')) resp = "Todos os sistemas operando dentro da normalidade.";
      if (user.cargo.includes('Engenheiro')) resp = "Pressão no poço P-57 subiu 2%. Recomendo checagem.";

      setTimeout(() => {
        output.innerHTML += `<div><strong>IA:</strong> ${resp}</div>`;
        output.scrollTop = output.scrollHeight;
      }, 600);
      input.value = '';
    }

    function logout() {
      localStorage.removeItem('petro_user');
      location.reload();
    }

    // Checar se já está logado ao abrir
    window.onload = () => {
      const savedUser = localStorage.getItem('petro_user');
      if (savedUser) {
        showDashboard(JSON.parse(savedUser));
      } else {
        startCamera();
      }
    };
  </script>
</body>
</html>

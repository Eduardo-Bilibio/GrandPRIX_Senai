<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrobras AR - Smart Dashboard</title>
  
  <style>
    :root {
      --primary: #00ff88;
      --secondary: #00d4ff;
      --alert: #ff6b6b;
      --bg: #0f2027;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #203a43, #0f2027);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 450px;
      padding: 30px 20px;
    }

    /* Typography */
    h1 {
      font-size: 1.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
    }

    p.subtitle {
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 30px;
    }

    /* Login Screen / Scanner */
    #scanner-container {
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    #video {
      width: 100%;
      display: block;
      background: #000;
    }

    .scanner-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border: 2px solid var(--primary);
      border-radius: 20px;
      background: linear-gradient(var(--primary), var(--primary)) 50% 50% / 2px 100% no-repeat,
                  linear-gradient(var(--primary), var(--primary)) 50% 50% / 100% 2px no-repeat;
      background-size: 0% 0%; /* Linhas cruzadas suaves */
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
      animation: scan-pulse 2s infinite;
    }

    @keyframes scan-pulse {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }

    #status {
      margin-top: 20px;
      font-weight: 500;
      color: var(--primary);
      letter-spacing: 1px;
    }

    /* Dashboard Layout */
    .hidden { display: none !important; }

    .user-card {
      background: var(--glass);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      margin-bottom: 25px;
      backdrop-filter: blur(10px);
    }

    .user-card h2 { font-size: 1.4rem; color: #fff; }
    
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      background: rgba(0, 212, 255, 0.15);
      color: var(--secondary);
      padding: 4px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      margin-top: 8px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Metrics Grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }

    .card {
      background: var(--glass);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      text-align: left;
      transition: transform 0.3s;
    }

    .card:active { transform: scale(0.98); }

    .card label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .card .val {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--secondary);
    }

    .full-width { grid-column: span 2; }

    .alert-card {
      border-left: 4px solid var(--alert);
      background: rgba(255, 107, 107, 0.05);
    }
    
    .alert-card .val { color: var(--alert); }

    /* Footer / Logout */
    .logout-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--glass-border);
      color: #888;
      padding: 15px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255, 107, 107, 0.1);
      color: var(--alert);
      border-color: var(--alert);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <section id="login-screen">
      <header>
        <h1>Petrobras AR</h1>
        <p class="subtitle">Identificação Industrial Requerida</p>
      </header>

      <div id="scanner-container">
        <video id="video" autoplay muted playsinline></video>
        <div class="scanner-frame"></div>
      </div>
      <p id="status">SCANNING...</p>
    </section>

    <section id="dashboard-screen" class="hidden">
      <div class="user-card">
        <h2 id="welcome-name">---</h2>
        <span id="user-cargo" class="badge">---</span>
      </div>

      <div class="grid">
        <div class="card">
          <label>Produção (24h)</label>
          <span id="m-prod" class="val">---</span>
        </div>
        <div class="card">
          <label>Poços Ativos</label>
          <span id="m-pocos" class="val">---</span>
        </div>
        <div id="orc-card" class="card full-width">
          <label>Budget Disponível</label>
          <span id="m-orc" class="val">---</span>
        </div>
        <div class="card alert-card full-width">
          <label>Alertas de Sistema</label>
          <span id="m-alertas" class="val">---</span>
        </div>
      </div>

      <button class="logout-btn" onclick="logout()">Encerrar Sessão com Segurança</button>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    const USERS = {
      '123': { name: 'João Silva', cargo: 'Engenheiro Sênior', nivel: 'alto' },
      '456': { name: 'Maria Santos', cargo: 'Analista Júnior', nivel: 'baixo' },
      '789': { name: 'Carlos Oliveira', cargo: 'Gerente Operacional', nivel: 'alto' }
    };

    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          video.srcObject = stream;
          requestAnimationFrame(tick);
        })
        .catch(err => {
          document.getElementById('status').textContent = "ERRO DE CÂMERA";
        });
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
          authenticate(code.data);
          return;
        }
      }
      if (!document.getElementById('login-screen').classList.contains('hidden')) {
        requestAnimationFrame(tick);
      }
    }

    function authenticate(token) {
      const user = USERS[token];
      if (!user) {
        document.getElementById('status').textContent = "ACESSO NEGADO";
        setTimeout(() => document.getElementById('status').textContent = "SCANNING...", 2000);
        return;
      }
      localStorage.setItem('petro_session', JSON.stringify(user));
      renderDashboard(user);
    }

    function renderDashboard(user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      
      document.getElementById('welcome-name').textContent = user.name;
      document.getElementById('user-cargo').textContent = user.cargo;

      const isAdmin = user.nivel === 'alto';
      
      // Simulação de Dados Dinâmicos
      document.getElementById('m-prod').textContent = isAdmin ? '2.450 bbl' : '2.100 bbl';
      document.getElementById('m-pocos').textContent = isAdmin ? '47' : '32';
      document.getElementById('m-alertas').textContent = isAdmin ? '2 CRÍTICOS' : 'SEM ALERTAS';
      
      const orcCard = document.getElementById('orc-card');
      if (isAdmin) {
        orcCard.classList.remove('hidden');
        document.getElementById('m-orc').textContent = '$ 12.450.000';
      } else {
        orcCard.classList.add('hidden');
      }
    }

    function logout() {
      localStorage.removeItem('petro_session');
      location.reload();
    }

    window.onload = () => {
      const saved = localStorage.getItem('petro_session');
      if (saved) renderDashboard(JSON.parse(saved));
      else startCamera();
    };
  </script>
</body>
</html>

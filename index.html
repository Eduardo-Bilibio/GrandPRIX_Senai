<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Petrobras AR - Portal de Monitoramento</title>
  
  <style>
    :root {
      --petro-verde: #008542;
      --petro-amarelo: #FFD100;
      --petro-cinza: #f4f4f4;
      --text-dark: #333;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: var(--petro-cinza);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    /* Header com Logo */
    header {
      background-color: var(--white);
      padding: 25px;
      text-align: center;
      border-bottom: 4px solid var(--petro-amarelo);
    }

    .logo-container {
      margin-bottom: 10px;
    }

    /* Representação da Logo via CSS para não depender de link externo */
    .logo-mock {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--petro-verde);
      letter-spacing: -1px;
    }
    .logo-mock span { color: var(--petro-amarelo); }

    h1 {
      font-size: 1rem;
      color: var(--petro-verde);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Scanner Area */
    #login-screen {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #scanner-wrap {
      position: relative;
      width: 100%;
      border-radius: 15px;
      overflow: hidden;
      border: 3px solid var(--petro-verde);
    }

    #video { width: 100%; display: block; background: #000; }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--petro-amarelo);
      box-shadow: 0 0 15px var(--petro-amarelo);
      animation: scan-move 3s linear infinite;
    }

    @keyframes scan-move {
      0% { top: 0; }
      100% { top: 100%; }
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      color: var(--petro-verde);
    }

    /* Dashboard Layout */
    .hidden { display: none !important; }

    #dashboard-screen {
      padding: 20px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .user-info {
      background: var(--petro-verde);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      position: relative;
    }

    .user-info h2 { font-size: 1.2rem; margin-bottom: 5px; }
    .cargo-tag {
      background: var(--petro-amarelo);
      color: var(--petro-verde);
      font-size: 0.75rem;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 5px;
      text-transform: uppercase;
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    .card label {
      font-size: 0.7rem;
      font-weight: bold;
      color: #777;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .card .value {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--petro-verde);
    }

    .full { grid-column: span 2; }

    .alert-box {
      border-left: 5px solid #d9534f;
      background: #fff5f5;
    }

    .alert-box .value { color: #d9534f; }

    /* Botão Sair */
    .btn-logout {
      margin-top: 30px;
      width: 100%;
      padding: 15px;
      border: none;
      background: #e7e7e7;
      color: #666;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-logout:hover { background: #dcdcdc; color: #333; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo-container">
        <div class="logo-mock">PETRO<span>BRAS</span></div>
      </div>
      <h1>Controle de Acesso AR</h1>
    </header>

    <section id="login-screen">
      <div id="scanner-wrap">
        <video id="video" autoplay muted playsinline></video>
        <div class="scan-line"></div>
      </div>
      <p id="status">POSICIONE O QR CODE</p>
    </section>

    <section id="dashboard-screen" class="hidden">
      <div class="user-info">
        <h2 id="user-name">---</h2>
        <span id="user-cargo" class="cargo-tag">---</span>
      </div>

      <div class="grid">
        <div class="card">
          <label>⛽ Produção Diária</label>
          <span id="m-prod" class="value">---</span>
        </div>
        <div class="card">
          <label>🏗️ Unidades</label>
          <span id="m-pocos" class="value">---</span>
        </div>
        <div id="orc-card" class="card full">
          <label>💳 Orçamento de Manutenção</label>
          <span id="m-orc" class="value">---</span>
        </div>
        <div class="card full alert-box">
          <label>⚠️ Alertas de Segurança</label>
          <span id="m-alertas" class="value">---</span>
        </div>
      </div>

      <button class="btn-logout" onclick="logout()">Encerrar Sessão</button>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    const DB_USUARIOS = {
      '123': { nome: 'JOÃO SILVA', cargo: 'Engenheiro de Campo', nivel: 'alto' },
      '456': { nome: 'MARIA SANTOS', cargo: 'Técnica de Operação', nivel: 'baixo' },
      '789': { nome: 'CARLOS OLIVEIRA', cargo: 'Gerente de Plataforma', nivel: 'alto' }
    };

    function iniciaCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          video.srcObject = stream;
          requestAnimationFrame(loop);
        })
        .catch(() => {
          document.getElementById('status').textContent = "CÂMERA NÃO DISPONÍVEL";
        });
    }

    function loop() {
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(img.data, img.width, img.height);
        
        if (qr) {
          validar(qr.data);
          return;
        }
      }
      if (!document.getElementById('login-screen').classList.contains('hidden')) {
        requestAnimationFrame(loop);
      }
    }

    function validar(id) {
      const user = DB_USUARIOS[id];
      if (!user) {
        document.getElementById('status').textContent = "ID NÃO CADASTRADO";
        document.getElementById('status').style.color = "red";
        setTimeout(() => {
          document.getElementById('status').textContent = "POSICIONE O QR CODE";
          document.getElementById('status').style.color = "#008542";
        }, 2000);
        return;
      }
      localStorage.setItem('petro_auth', JSON.stringify(user));
      carregarDash(user);
    }

    function carregarDash(user) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      
      document.getElementById('user-name').textContent = user.nome;
      document.getElementById('user-cargo').textContent = user.cargo;

      const admin = user.nivel === 'alto';
      document.getElementById('m-prod').textContent = admin ? '2.450 bbl' : '1.980 bbl';
      document.getElementById('m-pocos').textContent = admin ? '47 Poços' : '32 Poços';
      document.getElementById('m-alertas').textContent = admin ? '2 ALERTAS ATIVOS' : 'NENHUM ALERTA';
      
      const orc = document.getElementById('orc-card');
      if (admin) {
        orc.style.display = 'flex';
        document.getElementById('m-orc').textContent = 'R$ 12.450.000,00';
      } else {
        orc.style.display = 'none';
      }
    }

    function logout() {
      localStorage.removeItem('petro_auth');
      location.reload();
    }

    window.onload = () => {
      const logado = localStorage.getItem('petro_auth');
      if (logado) carregarDash(JSON.parse(logado));
      else iniciaCamera();
    };
  </script>
</body>
</html>
